<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>极简默写 - 极限交付版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F8F8F6; 
            color: #2C2C2E;
            overflow: hidden;
            transition: background-color 0.15s, transform 0.2s cubic-bezier(0.2, 0, 0.2, 1);
        }

        #timerBar { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: #E5E5E0; z-index: 1000; }
        #timerFill { width: 100%; height: 100%; background: #2C2C2E; transition: width 0.1s linear; }

        .slot {
            width: 2.2rem; height: 3.5rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 500;
            border-bottom: 2px solid #E5E5E0;
            transition: all 0.2s ease; margin: 0 0.15rem;
        }
        .slot.active { border-bottom-color: #2C2C2E; }
        .slot.hinted { color: #D1D1CB; }

        /* 10连对：负片闪烁 */
        .perfect-flash { background-color: #2C2C2E !important; color: #F8F8F6 !important; }

        /* 全屏轨道 */
        #screenOrbit { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 999; }
        .orbit-path { fill: none; stroke: currentColor; stroke-width: 4; stroke-dasharray: 4000; stroke-dashoffset: 4000; opacity: 0; }
        .run-orbit-mega { animation: orbitMega 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes orbitMega {
            0% { stroke-dashoffset: 4000; opacity: 1; stroke-width: 15; }
            100% { stroke-dashoffset: 0; opacity: 0; stroke-width: 2; }
        }

        .body-impact { animation: bodyImpact 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes bodyImpact { 0% { transform: scale(1); } 50% { transform: scale(0.94); } 100% { transform: scale(1); } }

        /* 对号重绘 - 尺寸微调 */
        .svg-checkmark { width: 60px; height: 60px; fill: none; stroke: currentColor; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
        .draw-check { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawCheck 0.4s ease-out forwards; }
        @keyframes drawCheck { to { stroke-dashoffset: 0; } }

        /* 对号盒子位置：上移 */
        .incentive-box { animation: floatUp 1.1s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(10px); }
            15% { opacity: 1; transform: translateY(-30px); } /* 向上跃起更多，防止挡字 */
            85% { opacity: 1; transform: translateY(-30px); }
            100% { opacity: 0; transform: translateY(-60px); }
        }

        .perfect-text { font-weight: 900; font-style: italic; font-size: 0.8rem; letter-spacing: 0.4em; margin-top: 10px; text-transform: uppercase; }
        .shake { animation: shake 0.4s ease; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .timer-warning { background: #EF4444 !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6" id="mainBody">

    <div id="timerBar"><div id="timerFill"></div></div>
    <svg id="screenOrbit"><rect id="orbitRect" class="orbit-path" x="0" y="0" width="100%" height="100%" /></svg>

    <div class="relative flex flex-col items-center w-full max-w-sm">
        <div id="chinese" class="text-xl font-medium mb-16 tracking-tight text-[#444446]">加载中...</div>
        <div class="relative flex h-16 items-center" id="inputRow"></div>
        
        <div id="fxLayer" class="absolute -top-32 flex items-center justify-center w-64 h-64 pointer-events-none"></div>

        <div class="mt-24 flex flex-col items-center gap-3">
            <div id="comboDisplay" class="text-[10px] font-black tracking-[0.4em] uppercase text-[#C1C1BE]">Combo 0</div>
            <div class="flex gap-8 text-[9px] text-[#D1D1CB] uppercase tracking-[0.2em] font-bold opacity-60">
                <span>Space / Hint</span>
                <span>Enter / Check</span>
            </div>
        </div>
    </div>

    <input type="text" id="masterInput" class="opacity-0 absolute" autofocus autocomplete="off">

    <script>
        const words = [
            {en: "efficient", cn: "高效的"}, {en: "dynamic", cn: "动态的"},
            {en: "strategy", cn: "策略"}, {en: "absolute", cn: "绝对的"},
            {en: "velocity", cn: "速度"}, {en: "focus", cn: "焦点"},
            {en: "command", cn: "指令"}, {en: "instant", cn: "即时的"},
            {en: "power", cn: "力量"}, {en: "rhythm", cn: "节奏"},
            {en: "lightning", cn: "闪电"}, {en: "mastery", cn: "精通"}
        ];

        let index = 0, userInput = "", hints = 0, combo = 0, timer = null, timeLeft = 100;
        const mainBody = document.getElementById('mainBody');
        const inputRow = document.getElementById('inputRow');
        const timerFill = document.getElementById('timerFill');
        const comboDisplay = document.getElementById('comboDisplay');
        const masterInput = document.getElementById('masterInput');
        const fxLayer = document.getElementById('fxLayer');
        const orbitRect = document.getElementById('orbitRect');

        function startTimer() {
            clearInterval(timer);
            timeLeft = 100;
            timerFill.classList.remove('timer-warning');
            timer = setInterval(() => {
                timeLeft -= 1.2; 
                timerFill.style.width = timeLeft + "%";
                if (timeLeft < 30) timerFill.classList.add('timer-warning');
                if (timeLeft <= 0) gameOver();
            }, 100);
        }

        function gameOver() {
            clearInterval(timer);
            combo = 0; updateComboUI();
            inputRow.classList.add('shake');
            setTimeout(() => { inputRow.classList.remove('shake'); init(); }, 400);
        }

        function init() {
            if (index >= words.length) {
                document.getElementById('chinese').innerText = "All Clear";
                inputRow.innerHTML = "";
                return;
            }
            userInput = ""; hints = 0; masterInput.value = "";
            document.getElementById('chinese').innerText = words[index].cn;
            inputRow.innerHTML = "";
            for (let i = 0; i < words[index].en.length; i++) {
                const d = document.createElement('div');
                d.className = "slot"; d.id = `s-${i}`;
                inputRow.appendChild(d);
            }
            startTimer();
            render();
        }

        function render() {
            const word = words[index].en;
            for (let i = 0; i < word.length; i++) {
                const el = document.getElementById(`s-${i}`);
                if (!el) continue;
                el.innerText = i < hints ? word[i] : (userInput[i] || "");
                el.className = "slot" + (i === userInput.length ? " active" : "") + (i < hints ? " hinted" : "");
            }
        }

        function updateComboUI() {
            comboDisplay.innerText = `Combo ${combo}`;
        }

        function triggerFX() {
            clearInterval(timer);
            combo++;
            updateComboUI();

            if (combo >= 10) {
                const pathLen = (window.innerWidth + window.innerHeight) * 2;
                orbitRect.style.strokeDasharray = pathLen;
                orbitRect.style.strokeDashoffset = pathLen;
                orbitRect.classList.remove('run-orbit-mega');
                mainBody.classList.remove('body-impact', 'perfect-flash');
                void orbitRect.offsetWidth; 
                orbitRect.classList.add('run-orbit-mega');
                setTimeout(() => {
                    mainBody.classList.add('perfect-flash', 'body-impact');
                    setTimeout(() => mainBody.classList.remove('perfect-flash'), 120);
                }, 350);
            }

            fxLayer.innerHTML = `
                <div class="incentive-box flex flex-col items-center justify-center">
                    <svg class="svg-checkmark" viewBox="0 0 24 24">
                        <path class="draw-check" d="M5 12l5 5L20 7" />
                    </svg>
                    ${combo >= 10 ? `<div class="perfect-text">PERFECT x${combo}</div>` : ''}
                </div>`;

            setTimeout(() => { index++; init(); }, 900);
        }

        masterInput.addEventListener('input', (e) => {
            userInput = e.target.value.toLowerCase().replace(/[^a-z]/g, '').slice(0, words[index].en.length);
            render();
            if (userInput === words[index].en) triggerFX();
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                if (hints < words[index].en.length) {
                    hints++; 
                    userInput = words[index].en.slice(0, hints);
                    masterInput.value = userInput;
                    render();
                }
            } else if (e.key === 'Enter' && e.shiftKey) {
                combo = 0; updateComboUI(); index++; init();
            }
        });

        document.addEventListener('click', () => masterInput.focus());
        window.addEventListener('resize', () => {
            const pathLen = (window.innerWidth + window.innerHeight) * 2;
            orbitRect.style.strokeDasharray = pathLen;
        });
        init();
    </script>
</body>
</html>
