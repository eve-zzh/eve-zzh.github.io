<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Eve | Portfolio</title>
    <style>
        /* 1. 基础样式：黑白、高级感 */
        body {
            background-color: #fff;
            color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 40px;
            line-height: 1.5;
        }

        /* 2. 顶部个人信息 */
        header { margin-bottom: 100px; }
        h1 { font-size: 3rem; font-weight: 900; margin: 0; letter-spacing: -2px; }
        .bio { font-size: 1.1rem; color: #666; margin-top: 10px; }

        /* 3. 项目列表：通用的，想加几个加几个 */
        .project-section { margin-top: 50px; }
        .section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #999; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 30px; }
        
        .project-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: #000;
            padding: 20px 0;
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.2s ease;
        }

        .project-link:hover { padding-left: 10px; background-color: #fafafa; }
        .project-name { font-size: 1.25rem; font-weight: 600; }
        .project-type { font-size: 0.8rem; color: #999; text-transform: uppercase; }

        /* 4. 底部联系方式 */
        footer { margin-top: 150px; font-size: 0.8rem; color: #ccc; }
        .contact-links a { color: #999; text-decoration: none; margin-right: 20px; border-bottom: 1px solid transparent; }
        .contact-links a:hover { color: #000; border-bottom: 1px solid #000; }
    </style>
</head>
<body>

    <header>
        <h1>EVE.</h1>
        <p class="bio">后端开发工程师 / 专注于简洁的代码与高效的架构</p>
    </header>

    <div class="project-section">
        <div class="section-label">Works / 项目集成</div>

        <a href="word-tree.html" class="project-link">
            <span class="project-name">词汇成长树</span>
            <span class="project-type">Interactive / JS</span>
        </a>

        <a href="https://github.com/eve-zzh/new-api" class="project-link">
            <span class="project-name">New-API Service</span>
            <span class="project-type">Backend / Go</span>
        </a>

        <a href="#" class="project-link" style="opacity: 0.3; cursor: default;">
            <span class="project-name">Coming Soon...</span>
            <span class="project-type">Future Project</span>
        </a>

    </div>

    <footer>
        <div class="contact-links">
            <a href="https://github.com/eve-zzh">GITHUB</a>
            <a href="mailto:你的邮箱">EMAIL</a>
        </div>
        <p style="margin-top: 20px;">© 2026 EVE. ALL RIGHTS RESERVED.</p>
    </footer>

</body>
</html>
