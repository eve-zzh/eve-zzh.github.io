<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eve | Product Manager & Developer</title>
    <style>
        :root {
            --primary: #000;
            --secondary: #666;
            --bg: #fff;
        }
        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
        }
        header { margin-bottom: 80px; }
        h1 { font-size: 3.5rem; font-weight: 900; margin: 0; letter-spacing: -2px; }
        .role { font-size: 1.1rem; color: var(--secondary); margin-top: 10px; font-weight: 400; }
        
        /* 模块化入口 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
        }
        .module-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ccc;
            margin-bottom: 15px;
            display: block;
        }
        .nav-link {
            display: block;
            text-decoration: none;
            color: var(--primary);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            transition: 0.2s;
        }
        .nav-link:hover { color: var(--secondary); text-decoration: underline; }
        .desc { font-size: 0.85rem; color: var(--secondary); line-height: 1.4; }

        footer { margin-top: 100px; font-size: 0.75rem; color: #eee; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Eve Zhang.</h1>
            <p class="role">产品经理 / 终身学习者</p>
        </header>

        <div class="grid">
            <div>
                <span class="module-label">Portfolio</span>
                <a href="https://github.com/eve-zzh?tab=repositories" class="nav-link">Builds & Projects →</a>
                <p class="desc">所有技术实践与产品原型，实时同步于 GitHub 仓库。</p>
            </div>

            <div>
                <span class="module-label">Profile</span>
                <a href="#" class="nav-link">Resume / CV</a>
                <p class="desc">关于我的个人经历以及思考。</p>
            </div>

            <div>
                <span class="module-label">Connect</span>
                <a href="mailto:你的邮箱" class="nav-link">Get in touch</a>
                <p class="desc">欢迎业务交流或技术探讨。</p>
            </div>
        </div>

        <footer>© 2026 EVE. ALL RIGHTS RESERVED.</footer>
    </div>

</body>
</html>
